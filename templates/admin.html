<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="bg"></div>

    <div class="container">


        <div class="card">
            <h1>📊 Dashboard de Mensagens</h1>
            <p class="sub">Histórico do sistema de automação</p>

            <table>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Mensagem</th>
                    <th>Resposta</th>
                    <th>Data</th>
                </tr>

                {% for linha in dados %}
                <tr>
                    <td>{{ linha[0] }}</td>
                    <td>{{ linha[1] }}</td>
                    <td>{{ linha[2] }}</td>
                    <td>{{ linha[3] }}</td>
                    <td>{{ linha[4] }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
        <button id="voltar_button" type="button" onclick="window.location.href='/'">Voltar</button>
    </div>

</body>

</html>
